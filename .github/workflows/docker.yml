name: Docker Build

on:
  workflow_dispatch:
    inputs:
      service:
        description: "要构建的服务"
        required: true
        type: choice
        options:
          - all
          - server
          - cli
          - web
        default: all
      tag:
        description: "镜像标签（留空则使用 git sha）"
        required: false
        type: string
        default: ""
      push:
        description: "是否推送到 Registry"
        required: true
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build-server:
    name: Build Server
    if: inputs.service == 'all' || inputs.service == 'server'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/server
          push: ${{ inputs.push }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/server:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}/server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-cli:
    name: Build CLI
    if: inputs.service == 'all' || inputs.service == 'cli'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/cli
          push: ${{ inputs.push }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/cli:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}/cli:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-web:
    name: Build Web
    if: inputs.service == 'all' || inputs.service == 'web'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: inputs.push
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "value=${{ inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "value=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./apps/web
          push: ${{ inputs.push }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/web:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}/web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
