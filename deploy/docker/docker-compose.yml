# Agent Kit Admin - Docker Compose
# 开发环境: docker compose up -d
# 生产环境: docker compose --profile prod up -d

services:
  # PostgreSQL 16 数据库
  db:
    image: postgres:16-alpine
    container_name: akit-db
    restart: unless-stopped
    ports:
      - "${DB_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${DB_USER:-agentkit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentkit_dev_2024}
      POSTGRES_DB: ${DB_NAME:-agentkit}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentkit}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - akit-network

  # MinIO 对象存储
  minio:
    image: minio/minio:latest
    container_name: akit-minio
    restart: unless-stopped
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_2024}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - akit-network

  # MinIO 初始化 - 创建 bucket
  minio-init:
    image: minio/mc:latest
    container_name: akit-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/packages;
        mc anonymous set download local/packages;
        echo 'MinIO initialization complete!';
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_2024}
    networks:
      - akit-network

  # Server (FastAPI) — 生产环境
  server:
    profiles: ["prod"]
    build:
      context: ../../apps/server
      dockerfile: Dockerfile
    container_name: akit-server
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-agentkit}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-agentkit}
      MINIO_ENDPOINT: minio:9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: packages
      JWT_SECRET: ${JWT_SECRET:?请设置 JWT_SECRET}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - akit-network

  # Web (React) — 生产环境
  web:
    profiles: ["prod"]
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    container_name: akit-web
    restart: unless-stopped
    depends_on:
      - server
    networks:
      - akit-network

  # Caddy 网关 — 生产环境
  caddy:
    profiles: ["prod"]
    image: caddy:2
    container_name: akit-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - server
      - web
    networks:
      - akit-network

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:

networks:
  akit-network:
    driver: bridge
